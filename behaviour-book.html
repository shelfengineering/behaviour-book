    <!-- ===== Quick Log Modal ===== -->
    <div x-show="showQuickLog" class="modal-overlay" @click.self="showQuickLog = false" style="display: none;">
      <div class="modal-content slide-up" role="dialog" aria-modal="true" @click.stop>
        <div class="modal-handle"></div>
        <div class="modal-title" x-text="batchMode ? 'Batch Log' : 'Log Behaviour Entry'"></div>

        <!-- Step 1: Select Student(s) -->
        <div x-show="logStep === 1">
          <div class="flex items-center justify-between mb-12">
            <input type="text" class="search-input" style="flex: 1;" placeholder="Search student..." x-model="logStudentSearch">
            <button class="btn btn-sm" :class="batchMode ? 'btn-primary' : 'btn-secondary'" style="margin-left: 8px; white-space: nowrap;" @click="batchMode = !batchMode; batchStudentIds = []" x-text="batchMode ? 'Batch ON' : 'Batch'"></button>
          </div>
          <div x-show="batchMode" class="text-xs text-muted mb-8">Tap multiple students, then continue. One entry will be created for each.</div>
          <div class="student-grid" style="max-height: 50dvh; overflow-y: auto;">
            <template x-for="student in logFilteredStudents()" :key="student.id">
              <div class="student-card" :class="{ selected: batchMode ? batchStudentIds.includes(student.id) : logEntry.studentId === student.id }" @click="batchMode ? toggleBatchStudent(student.id) : (logEntry.studentId = student.id, logStep = 2)">
                <div class="student-avatar" :style="'background:' + avatarColor(student.name) + '; width: 36px; height: 36px; font-size: 0.85rem;'">
                  <span x-text="initials(student.name)"></span>
                </div>
                <div class="student-name" x-text="student.name"></div>
              </div>
            </template>
          </div>
          <button x-show="batchMode && batchStudentIds.length > 0" class="btn btn-primary btn-block mt-12" @click="logStep = 2" x-text="'Continue (' + batchStudentIds.length + ' students)'"></button>
        </div>

        <!-- Step 2: Type + Category -->
        <div x-show="logStep === 2">
          <!-- Student context (single mode) -->
          <div x-show="!batchMode && logEntry.studentId" style="background: var(--sand); border-radius: 8px; padding: 10px 12px; margin-bottom: 12px;">
            <div style="display: flex; align-items: center; gap: 8px;">
              <div class="student-avatar" :style="'background:' + avatarColor(getStudentName(logEntry.studentId)) + '; width: 30px; height: 30px; font-size: 0.7rem;'">
                <span x-text="initials(getStudentName(logEntry.studentId))"></span>
              </div>
              <span class="fw-700 text-sm" x-text="getStudentName(logEntry.studentId)"></span>
              <span class="badge" :class="'badge-tier' + getTier(logEntry.studentId)" x-text="'T' + getTier(logEntry.studentId)" style="font-size: 0.65rem; padding: 1px 7px;"></span>
              <span class="text-xs" :style="getRatio(logEntry.studentId) < 4 ? 'color:var(--clay)' : 'color:var(--sage)'" x-text="hasEntries(logEntry.studentId) ? getRatio(logEntry.studentId).toFixed(1)+':1' : ''"></span>
              <button class="text-xs" style="color: var(--clay); margin-left: auto;" @click="logStep = 1; logEntry.studentId = '';">Change</button>
            </div>
            <template x-if="getStudentEntries(logEntry.studentId).length > 0">
              <div style="border-top: 1px solid var(--sand-dark); margin-top: 6px; padding-top: 4px;">
                <template x-for="e in getStudentEntries(logEntry.studentId).slice(0, 3)" :key="e.id">
                  <div class="text-xs" style="display: flex; gap: 6px; padding: 1px 0; color: var(--warm-grey);">
                    <span :style="e.type==='positive' ? 'color:var(--sage)' : 'color:var(--clay)'" x-text="e.type==='positive' ? '+' : '\u2013'"></span>
                    <span x-text="e.category"></span>
                    <span x-text="formatDate(e.date)"></span>
                  </div>
                </template>
              </div>
            </template>
          </div>
          <!-- Batch mode header -->
          <div x-show="batchMode" class="text-sm text-muted mb-8">
            Logging for <span class="fw-700" x-text="batchStudentIds.length"></span> students
          </div>

          <div class="type-toggle mb-16">
            <button class="type-btn" :class="{ 'positive-selected': logEntry.type === 'positive' }" @click="logEntry.type = 'positive'; logEntry.severity = null;">
              <span class="type-icon">&#128077;</span>
              Positive
            </button>
            <button class="type-btn" :class="{ 'negative-selected': logEntry.type === 'negative' }" @click="logEntry.type = 'negative'; logEntry.severity = 'minor';">
              <span class="type-icon">&#9888;&#65039;</span>
              Negative
            </button>
          </div>

          <div x-show="logEntry.type === 'negative'" class="severity-toggle mb-16">
            <button class="severity-btn" :class="{ 'minor-selected': logEntry.severity === 'minor' }" @click="logEntry.severity = 'minor'">Minor</button>
            <button class="severity-btn" :class="{ 'major-selected': logEntry.severity === 'major' }" @click="logEntry.severity = 'major'">Major</button>
          </div>

          <div class="form-label" x-text="logEntry.type === 'positive' ? 'What did they do well?' : (logEntry.severity === 'major' ? 'Major behaviour:' : 'Minor behaviour:')"></div>
          <div class="chip-grid">
            <template x-for="cat in getLogCategories()" :key="cat">
              <button class="chip" :class="{ selected: logEntry.category === cat, 'chip-positive': logEntry.type === 'positive' }" @click="logEntry.category = cat">
                <span x-text="cat"></span>
              </button>
            </template>
          </div>

          <!-- Quick-save for positives / Continue for negatives -->
          <div x-show="logEntry.category" class="mt-16">
            <div x-show="logEntry.type === 'positive'" class="flex gap-8">
              <button class="btn btn-positive" style="flex: 1;" @click="quickSaveEntry()">Save Now</button>
              <button class="btn btn-secondary" @click="logStep = 3">Add Details</button>
            </div>
            <div x-show="logEntry.type === 'negative'">
              <button class="btn btn-primary btn-block" @click="logStep = 3">Continue</button>
            </div>
          </div>
        </div>

        <!-- Step 3: Details -->
        <div x-show="logStep === 3">
          <div class="text-sm text-muted mb-12">
            <span class="fw-700" x-text="batchMode ? batchStudentIds.length + ' students' : getStudentName(logEntry.studentId)"></span> —
            <span class="badge" :class="logEntry.type === 'positive' ? 'badge-positive' : (logEntry.severity === 'major' ? 'badge-major' : 'badge-minor')" x-text="logEntry.category"></span>
          </div>

          <!-- Date/time override -->
          <div class="form-group">
            <label class="form-label">When</label>
            <div class="flex gap-8 items-center">
              <button class="chip" :class="{ selected: !logDateOverride }" @click="logDateOverride = ''">Now</button>
              <button class="chip" :class="{ selected: !!logDateOverride }" @click="logDateOverride = logDateOverride || new Date().toISOString().slice(0,16)">Earlier...</button>
            </div>
            <input x-show="logDateOverride" type="datetime-local" class="form-input mt-8" x-model="logDateOverride">
          </div>

          <div class="form-group">
            <label class="form-label">Location</label>
            <div class="btn-group">
              <template x-for="loc in settings.locations" :key="loc">
                <button class="btn-group-item" :class="{ selected: logEntry.location === loc }" @click="logEntry.location = loc" x-text="loc"></button>
              </template>
            </div>
          </div>

          <div class="form-group" x-show="settings.expectations.length > 0">
            <label class="form-label">Linked Expectation</label>
            <div class="btn-group">
              <button class="btn-group-item" :class="{ selected: logEntry.expectation === '' }" @click="logEntry.expectation = ''">None</button>
              <template x-for="exp in settings.expectations" :key="exp">
                <button class="btn-group-item" :class="{ selected: logEntry.expectation === exp }" @click="logEntry.expectation = exp" x-text="exp"></button>
              </template>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Description (optional)</label>
            <textarea class="form-input" x-model="logEntry.description" rows="2" placeholder="Brief note..." style="min-height: 50px;"></textarea>
          </div>

          <div class="form-group">
            <label class="form-label">Action taken (optional)</label>
            <div class="suggested-actions" x-show="logEntry.type === 'negative'">
              <div class="suggested-actions-label">Quick pick:</div>
              <template x-for="action in getSuggestedActions()" :key="action">
                <span class="action-chip" :class="{ selected: logEntry.action === action }" @click="logEntry.action = (logEntry.action === action ? '' : action)" x-text="action"></span>
              </template>
            </div>
            <div class="suggested-actions" x-show="logEntry.type === 'positive'">
              <div class="suggested-actions-label">Quick pick:</div>
              <template x-for="action in getSuggestedPositiveActions()" :key="action">
                <span class="action-chip" :class="{ selected: logEntry.action === action }" @click="logEntry.action = (logEntry.action === action ? '' : action)" x-text="action"></span>
              </template>
            </div>
            <input type="text" class="form-input mt-8" x-model="logEntry.action" placeholder="Or type your own...">
          </div>

          <div class="form-group">
            <label class="form-label" style="display: flex; align-items: center; gap: 8px;">
              <input type="checkbox" x-model="logHasFollowUp" style="width: 18px; height: 18px;">
              Schedule a follow-up
            </label>
            <div x-show="logHasFollowUp">
              <div class="followup-presets">
                <button class="followup-preset-btn" :class="{ selected: logFollowUpPreset === 'tomorrow' }" @click="setFollowUpPreset('tomorrow')">Tomorrow</button>
                <button class="followup-preset-btn" :class="{ selected: logFollowUpPreset === '2days' }" @click="setFollowUpPreset('2days')">In 2 days</button>
                <button class="followup-preset-btn" :class="{ selected: logFollowUpPreset === 'nextweek' }" @click="setFollowUpPreset('nextweek')">Next week</button>
                <button class="followup-preset-btn" :class="{ selected: logFollowUpPreset === '2weeks' }" @click="setFollowUpPreset('2weeks')">In 2 weeks</button>
                <button class="followup-preset-btn" :class="{ selected: logFollowUpPreset === 'custom' }" @click="logFollowUpPreset = 'custom'">Custom...</button>
              </div>
              <div x-show="logFollowUpPreset === 'custom'" class="mt-8">
                <input type="date" class="form-input" x-model="logFollowUpDate">
              </div>
              <input type="text" class="form-input mt-8" x-model="logFollowUpNote" placeholder="Follow-up note...">
            </div>
          </div>

          <div class="flex gap-8 mt-16">
            <button class="btn btn-secondary" @click="logStep = 2">Back</button>
            <button class="btn btn-primary" style="flex: 1;" @click="submitEntry()" x-text="batchMode ? 'Save ' + batchStudentIds.length + ' Entries' : 'Save Entry'"></button>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== Add Student Modal ===== -->
    <div x-show="showAddStudent" class="modal-overlay" @click.self="showAddStudent = false" style="display: none;">
      <div class="modal-content slide-up" role="dialog" aria-modal="true" @click.stop>
        <div class="modal-handle"></div>
        <div class="modal-title">Add Students</div>

        <!-- Tab: Single or Bulk -->
        <div class="tab-bar mb-16">
          <button class="tab-item" :class="{ active: addStudentMode === 'single' }" @click="addStudentMode = 'single'">Single</button>
          <button class="tab-item" :class="{ active: addStudentMode === 'bulk' }" @click="addStudentMode = 'bulk'">Bulk Import</button>
        </div>

        <!-- Single Mode -->
        <div x-show="addStudentMode === 'single'">
          <div class="form-group">
            <label class="form-label">Student Name</label>
            <input type="text" class="form-input" x-model="newStudent.name" placeholder="e.g. Emma T." @keydown.enter="addStudent()">
          </div>
          <div class="form-group">
            <label class="form-label">Grade / Class</label>
            <input type="text" class="form-input" x-model="newStudent.grade" placeholder="e.g. Year 3">
          </div>
          <div class="form-group">
            <label class="form-label">Notes (optional)</label>
            <textarea class="form-input" x-model="newStudent.notes" rows="2" placeholder="Any relevant notes..." style="min-height: 50px;"></textarea>
          </div>
          <div class="flex gap-8">
            <button class="btn btn-secondary" @click="showAddStudent = false">Cancel</button>
            <button class="btn btn-primary" style="flex: 1;" @click="addStudent()" :disabled="!newStudent.name.trim()">Add Student</button>
          </div>
        </div>

        <!-- Bulk Mode -->
        <div x-show="addStudentMode === 'bulk'">
          <div class="form-group">
            <label class="form-label">Paste student names (one per line)</label>
            <textarea class="form-input" x-model="bulkStudentText" rows="8" placeholder="Emma Thompson&#10;Liam Nguyen&#10;Olivia Patel&#10;Noah Williams&#10;Charlotte Brown&#10;..." style="min-height: 160px; font-size: 0.9rem; line-height: 1.8;"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Grade / Class (applied to all)</label>
            <input type="text" class="form-input" x-model="bulkStudentGrade" placeholder="e.g. Year 3">
          </div>
          <div class="text-sm text-muted mb-12" x-show="bulkStudentText.trim()">
            <span class="fw-700" x-text="bulkStudentText.trim().split('\n').filter(n => n.trim()).length"></span> students will be added
          </div>
          <div class="flex gap-8">
            <button class="btn btn-secondary" @click="showAddStudent = false">Cancel</button>
            <button class="btn btn-primary" style="flex: 1;" @click="addBulkStudents()" :disabled="!bulkStudentText.trim()">
              Add All Students
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== Edit Student Modal ===== -->
    <div x-show="showEditStudent" class="modal-overlay" @click.self="showEditStudent = false" style="display: none;">
      <div class="modal-content slide-up" role="dialog" aria-modal="true" @click.stop>
        <div class="modal-handle"></div>
        <div class="modal-title">Edit Student</div>
        <div class="form-group">
          <label class="form-label">Student Name</label>
          <input type="text" class="form-input" x-model="editingStudent.name">
        </div>
        <div class="form-group">
          <label class="form-label">Grade / Class</label>
          <input type="text" class="form-input" x-model="editingStudent.grade">
        </div>
        <div class="form-group">
          <label class="form-label">Notes</label>
          <textarea class="form-input" x-model="editingStudent.notes" rows="2"></textarea>
        </div>
        <div class="flex gap-8">
          <button class="btn btn-danger btn-sm" @click="deleteStudent(editingStudent.id)">Delete</button>
          <div style="flex: 1;"></div>
          <button class="btn btn-secondary" @click="showEditStudent = false">Cancel</button>
          <button class="btn btn-primary" @click="updateStudent()">Save</button>
        </div>
      </div>
    </div>

    <!-- ===== Save Help Modal ===== -->
    <div x-show="showSaveHelp" class="modal-overlay" @click.self="showSaveHelp = false" style="display: none;">
      <div class="modal-content slide-up" role="dialog" aria-modal="true" @click.stop>
        <div class="modal-handle"></div>
        <div class="modal-title">How Saving &amp; Loading Works</div>

        <p class="text-sm text-muted mb-16">Behaviour Book keeps your data <strong>completely private</strong> — nothing is uploaded to the internet. Instead, you save and load a file from your own device.</p>

        <div class="card mb-16" style="background: var(--positive-bg); border-left: 3px solid var(--sage);">
          <div class="fw-700 text-sm" style="color: var(--sage-dark); margin-bottom: 4px;">&#128274; Why a file?</div>
          <div class="text-xs" style="color: var(--sage-dark); line-height: 1.5;">Your student data is sensitive. By saving as a file on your device, there's no account, no server, and no way for anyone else to access it. You control the data completely.</div>
        </div>

        <div class="settings-section-title">Saving your data</div>

        <div style="margin-bottom: 16px;">
          <div class="save-help-platform">iPhone / iPad</div>
          <div class="save-help-step">
            <div class="save-help-num">1</div>
            <div class="save-help-text">Tap the <strong>Save</strong> button in the top bar</div>
          </div>
          <div class="save-help-step">
            <div class="save-help-num">2</div>
            <div class="save-help-text">Your phone's <strong>share sheet</strong> will appear — the same one you use to share photos or links</div>
          </div>
          <div class="save-help-step">
            <div class="save-help-num">3</div>
            <div class="save-help-text">Tap <strong>"Save to Files"</strong>, then choose a folder (e.g. "On My iPhone" or iCloud Drive)</div>
          </div>
          <div class="save-help-step">
            <div class="save-help-num">4</div>
            <div class="save-help-text">Tap <strong>Save</strong>. Done! Your data is safely stored as a file called <em>behaviour-book-[date].json</em></div>
          </div>
        </div>

        <div style="margin-bottom: 16px;">
          <div class="save-help-platform">Android</div>

// ===== Utility Functions =====
function genId(prefix) {
  if (typeof crypto !== 'undefined' && crypto.randomUUID) {
    return prefix + '_' + crypto.randomUUID().slice(0, 8);
  }
  // Fallback for file:// protocol or older browsers
  const chars = 'abcdef0123456789';
  let id = '';
  for (let i = 0; i < 8; i++) id += chars[Math.floor(Math.random() * chars.length)];
  return prefix + '_' + id;
}

function startOfDay(d) {
  // Handle date-only strings (e.g. "2026-05-10") by parsing as local, not UTC
  if (typeof d === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(d)) {
    const [y, m, day] = d.split('-').map(Number);
    return new Date(y, m - 1, day);
  }
  const date = new Date(d);
  date.setHours(0, 0, 0, 0);
  return date;
}

function daysBetween(a, b) { return Math.floor((startOfDay(b).getTime() - startOfDay(a).getTime()) / 86400000); }

function addDays(date, days) {
  const d = new Date(date);
  d.setDate(d.getDate() + days);
  return d;
}

function parseDate(d) {
  // Parse date-only strings as local time, not UTC
  if (typeof d === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(d)) {
    const [y, m, day] = d.split('-').map(Number);
    return new Date(y, m - 1, day);
  }
  return new Date(d);
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function fmtDate(d) {
  const date = parseDate(d);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return date.getDate() + ' ' + months[date.getMonth()];
}

function fmtDateTime(d) {
  const date = parseDate(d);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const h = date.getHours();
  const m = String(date.getMinutes()).padStart(2, '0');
  const ampm = h >= 12 ? 'pm' : 'am';
  return date.getDate() + ' ' + months[date.getMonth()] + ' ' + (h % 12 || 12) + ':' + m + ampm;
}

function fmtISODate(d) {
  const date = new Date(d);
  return date.getFullYear() + '-' + String(date.getMonth()+1).padStart(2,'0') + '-' + String(date.getDate()).padStart(2,'0');
}

function hashStr(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) { hash = ((hash << 5) - hash) + str.charCodeAt(i); hash |= 0; }
  return Math.abs(hash);
}

    loadFile() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            // Validate basic structure
            if (data.students && !Array.isArray(data.students)) throw new Error('Invalid students data');
            if (data.entries && !Array.isArray(data.entries)) throw new Error('Invalid entries data');
            // Filter out malformed records
            this.students = (data.students || []).filter(s => s && typeof s.id === 'string' && typeof s.name === 'string');
            this.entries = (data.entries || []).filter(e => e && typeof e.id === 'string' && typeof e.studentId === 'string' && typeof e.date === 'string');
            this.studentNotes = data.studentNotes || [];
            this.settings = { ...JSON.parse(JSON.stringify(DEFAULT_SETTINGS)), ...(data.settings || {}) };
            if (data.settings && data.settings.categories) {
              this.settings.categories = { ...DEFAULT_SETTINGS.categories, ...data.settings.categories };
            }
            if (data.settings && data.settings.tierThresholds) {
              this.settings.tierThresholds = { ...DEFAULT_SETTINGS.tierThresholds, ...data.settings.tierThresholds };
            }
            this.unsavedChanges = false;
            this.fileName = file.name;
            this.started = true;
            this.showToast('Data loaded from ' + file.name);
          } catch (err) {
            alert('Could not read file. Please check it is a valid Behaviour Book JSON file.');
          }
        };
        reader.readAsText(file);
      };
      input.click();
    },

    saveFile() {
      const data = {
        version: 1,
        exportDate: new Date().toISOString(),
        students: this.students,
        entries: this.entries,
        studentNotes: this.studentNotes,
        settings: this.settings
      };
      const fileName = 'behaviour-book-' + fmtISODate(new Date()) + '.json';
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const file = new File([blob], fileName, { type: 'application/json' });

      // Use Web Share API on mobile if available (works reliably on iOS + Android)
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      if (isMobile && navigator.canShare && navigator.canShare({ files: [file] })) {
        navigator.share({
          files: [file],
          title: 'Behaviour Book Data',
          text: 'Save this file to load your data next time.'
        }).then(() => {
          this.unsavedChanges = false;
          this.fileName = fileName;
          this.showToast('Data shared! Make sure you saved the file.');
        }).catch((err) => {
          // User cancelled the share sheet — that's fine, don't mark as saved
          if (err.name !== 'AbortError') {
            this.saveFileDownload(blob, fileName);
          }
        });
      } else {
        this.saveFileDownload(blob, fileName);
      }
    },

    saveFileDownload(blob, fileName) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      this.unsavedChanges = false;
      this.fileName = fileName;
      this.showToast('Data saved!');
    },

    handleBeforeUnload(e) {
      if (this.unsavedChanges && !this.demoMode) { e.preventDefault(); e.returnValue = ''; }
    },

    markChanged() {
      this.unsavedChanges = true;
      this._tierCache = {};
      this.triggerSaveWiggle();
    },

    triggerSaveWiggle() {
      this.saveWiggle = false;
      setTimeout(() => { this.saveWiggle = true; }, 10);
    },

    // ===== Student CRUD =====
    addStudent() {
      if (!this.newStudent.name.trim()) return;
      this.students.push({
        id: genId('stu'),
        name: this.newStudent.name.trim(),
        grade: this.newStudent.grade.trim(),
        notes: this.newStudent.notes.trim()
      });
      this.newStudent = { name: '', grade: '', notes: '' };
      this.showAddStudent = false;
      this.markChanged();
    },

    addBulkStudents() {
      const rawNames = this.bulkStudentText.split('\n').map(n => n.trim()).filter(n => n.length > 0);
      if (rawNames.length === 0) return;

      // Deduplicate within the pasted list (case-insensitive)
      const seen = new Set();
      const uniqueNames = [];
      rawNames.forEach(name => {
        const key = name.toLowerCase();
        if (!seen.has(key)) { seen.add(key); uniqueNames.push(name); }
      });

      // Filter out names that already exist
      const existingNames = new Set(this.students.map(s => s.name.toLowerCase()));
      const newNames = uniqueNames.filter(n => !existingNames.has(n.toLowerCase()));
      const skipped = uniqueNames.length - newNames.length;

      newNames.forEach(name => {
        this.students.push({
          id: genId('stu'),
          name: name,
          grade: this.bulkStudentGrade.trim(),
          notes: ''
        });
      });
      this.bulkStudentText = '';
      this.bulkStudentGrade = '';
      this.showAddStudent = false;
      if (newNames.length > 0) this.markChanged();
      const msg = newNames.length + ' student' + (newNames.length !== 1 ? 's' : '') + ' added' + (skipped > 0 ? ' (' + skipped + ' duplicate' + (skipped !== 1 ? 's' : '') + ' skipped)' : '') + '!';
      this.showToast(msg);
    },

    updateStudent() {
      const idx = this.students.findIndex(s => s.id === this.editingStudent.id);
      if (idx >= 0) { this.students[idx] = { ...this.editingStudent }; }
      this.showEditStudent = false;
      this.markChanged();
    },

    deleteStudent(id) {
      if (!confirm('Delete this student and all their entries? This cannot be undone.')) return;
      this.students = this.students.filter(s => s.id !== id);
      this.entries = this.entries.filter(e => e.studentId !== id);
      this.studentNotes = this.studentNotes.filter(n => n.studentId !== id);
      this.showEditStudent = false;
      this.currentView = 'students';
      this.markChanged();
    },

    // ===== Student Helpers =====
    selectedStudent() { return this.students.find(s => s.id === this.selectedStudentId) || null; },
    getStudentName(id) { const s = this.students.find(s => s.id === id); return s ? s.name : 'Unknown'; },
    initials(name) {
      if (!name || !name.trim()) return '?';
      return name.trim().split(/\s+/).filter(w => w.length > 0).map(w => w[0]).join('').toUpperCase().slice(0, 2) || '?';
    },
    avatarColor(name) { return AVATAR_COLORS[hashStr(name) % AVATAR_COLORS.length]; },

    sortedStudents() {
      return [...this.students].sort((a, b) => {
        const ta = this.getTier(a.id), tb = this.getTier(b.id);
        if (tb !== ta) return tb - ta;
        return a.name.localeCompare(b.name);
      });
    },

    filteredStudents() {
      const q = this.studentSearch.toLowerCase();
      if (!q) return this.sortedStudents();
      return this.sortedStudents().filter(s => s.name.toLowerCase().includes(q) || s.grade.toLowerCase().includes(q));
    },

    openStudentDetail(id) {
      this.selectedStudentId = id;
      this.detailFilter = 'all';
      this.currentView = 'student-detail';
    },

    // ===== Entry Helpers =====
    getStudentEntries(studentId) {
      return this.entries.filter(e => e.studentId === studentId).sort((a, b) => new Date(b.date) - new Date(a.date));
    },

    filteredStudentEntries() {
      let entries = this.getStudentEntries(this.selectedStudentId);
      if (this.detailFilter !== 'all') entries = entries.filter(e => e.type === this.detailFilter);
      return entries;
    },

    recentEntries() {
      return [...this.entries].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 10);
    },

    getRecentEntries(studentId, days) {
      const cutoff = new Date();
      cutoff.setDate(cutoff.getDate() - (days || this.settings.tierThresholds.rollingWindowDays));
      return this.entries.filter(e => e.studentId === studentId && new Date(e.date) >= cutoff);
    },

    // ===== Tier Calculation =====
    getTier(studentId) {
      const key = this.entries.length + '-' + studentId;
      if (this._tierCache[key] !== undefined) return this._tierCache[key];
      const recent = this.getRecentEntries(studentId);
      const negatives = recent.filter(e => e.type === 'negative');
      const majors = negatives.filter(e => e.severity === 'major');
      const minors = negatives.filter(e => e.severity === 'minor');
      let tier = 1;
      if (majors.length >= this.settings.tierThresholds.tier3MajorMin || minors.length >= this.settings.tierThresholds.tier3MinorMin) tier = 3;
      else if (minors.length >= this.settings.tierThresholds.tier2MinorMin) tier = 2;
      this._tierCache[key] = tier;
      return tier;
    },

    // ===== Ratio Calculation =====
    getRatio(studentId) {
      const recent = this.getRecentEntries(studentId);
      const pos = recent.filter(e => e.type === 'positive').length;
      const neg = recent.filter(e => e.type === 'negative').length;
      if (neg === 0) return pos > 0 ? pos : 0;
      return pos / neg;
    },

    getRatioPercent(studentId) {
      const recent = this.getRecentEntries(studentId);
      const pos = recent.filter(e => e.type === 'positive').length;
      const total = recent.length;
      if (total === 0) return 50;
      return Math.round((pos / total) * 100);
    },

    getStudentPositiveCount(studentId) { return this.getRecentEntries(studentId).filter(e => e.type === 'positive').length; },
    getStudentNegativeCount(studentId) { return this.getRecentEntries(studentId).filter(e => e.type === 'negative').length; },
    hasEntries(studentId) { return this.getRecentEntries(studentId).length > 0; },

    // ===== Pattern Detection =====
    getPatterns(studentId) {
      const patterns = [];
      const recent = this.getRecentEntries(studentId);
      const negatives = recent.filter(e => e.type === 'negative');

      const catCounts = {};
      negatives.forEach(e => { catCounts[e.category] = (catCounts[e.category] || 0) + 1; });
      Object.entries(catCounts).forEach(([cat, count]) => {
        if (count >= 3) patterns.push({ text: cat + ' logged ' + count + ' times in the last 4 weeks', detail: 'Consider re-teaching the linked expectation or a targeted intervention.', icon: '\u{1F504}', level: 'warning' });
      });

      const locCounts = {};
      negatives.forEach(e => { locCounts[e.location] = (locCounts[e.location] || 0) + 1; });
      Object.entries(locCounts).forEach(([loc, count]) => {
        if (count >= 3 && loc) patterns.push({ text: 'Most incidents occurring at ' + loc + ' (' + count + ' times)', detail: 'Consider environmental adjustments or increased supervision.', icon: '\u{1F4CD}', level: 'info' });
      });

      const ratio = this.getRatio(studentId);
      if (negatives.length > 0 && ratio < this.settings.ratioTarget) {
        patterns.push({ text: 'Positive ratio is ' + ratio.toFixed(1) + ':1 (target: ' + this.settings.ratioTarget + ':1)', detail: 'Increase positive acknowledgement to build the relationship.', icon: '\u{26A0}\u{FE0F}', level: 'warning' });
      }

      const majorsNoFollowUp = negatives.filter(e => e.severity === 'major' && (!e.followUp || !e.followUp.completed));
      if (majorsNoFollowUp.length > 0) patterns.push({ text: majorsNoFollowUp.length + ' major incident(s) without completed follow-up', detail: 'Schedule a restorative conversation or parent/carer contact.', icon: '\u{1F6A9}', level: 'overdue' });

      return patterns;
    },

    // ===== Next Steps =====
    getNextSteps(studentId) {
      const tier = this.getTier(studentId);
      const ratio = this.getRatio(studentId);
      const steps = [];
      let n = 0;

      if (tier === 1) {
        steps.push({ id: 'ns-' + (n++), text: 'Universal supports appropriate. Continue positive reinforcement and explicit teaching of expectations.', level: '', strategyKey: 'positive-reinforcement' });
      }
      if (tier === 2) {
        steps.push({ id: 'ns-' + (n++), text: 'Consider implementing Check-In Check-Out (CICO), social skills group, or peer mentoring.', level: 'warning', strategyKey: 'cico' });
        steps.push({ id: 'ns-' + (n++), text: 'Schedule a restorative conversation with the student.', level: 'warning', strategyKey: 'restorative-conversation' });
        steps.push({ id: 'ns-' + (n++), text: 'Consider contacting parent/carer to discuss support strategies.', level: 'warning', strategyKey: 'parent-contact' });
      }
      if (tier === 3) {
        steps.push({ id: 'ns-' + (n++), text: 'Recommend a Functional Behaviour Assessment (FBA) to identify triggers and functions of behaviour.', level: 'urgent', strategyKey: 'fba' });
        steps.push({ id: 'ns-' + (n++), text: 'Develop an individual Behaviour Support Plan in consultation with the Student Wellbeing Team.', level: 'urgent', strategyKey: 'bsp' });
        steps.push({ id: 'ns-' + (n++), text: 'Schedule a parent/carer meeting to collaboratively plan supports.', level: 'urgent', strategyKey: 'parent-contact' });
      }

      const recent = this.getRecentEntries(studentId);
      const negatives = recent.filter(e => e.type === 'negative');
      const catCounts = {};
      negatives.forEach(e => { catCounts[e.category] = (catCounts[e.category] || 0) + 1; });
      Object.entries(catCounts).forEach(([cat, count]) => {
        if (count >= 3) {
          const exps = [...new Set(negatives.filter(e => e.category === cat && e.expectation).map(e => e.expectation))];
          if (exps.length > 0) steps.push({ id: 'ns-' + (n++), text: 'Re-teach "' + exps[0] + '" \u2014 ' + cat + ' has been logged ' + count + ' times.', level: 'warning', strategyKey: 'reteach-expectation' });
        }
      });

      if (ratio < this.settings.ratioTarget && negatives.length > 0) {
        steps.push({ id: 'ns-' + (n++), text: 'Increase positive acknowledgement \u2014 current ratio is ' + ratio.toFixed(1) + ':1 (target: ' + this.settings.ratioTarget + ':1).', level: ratio < 2 ? 'urgent' : 'warning', strategyKey: 'increase-positives' });
      }

      return steps;
    },

    hasRecentMajor(studentId) { return this.getRecentEntries(studentId, 7).some(e => e.severity === 'major'); },

    // ===== Follow-ups =====
    getFollowUps(filter) {
      const today = startOfDay(new Date());
      return this.entries
        .filter(e => e.followUp && !e.followUp.completed)
        .map(e => {
          const fDate = startOfDay(e.followUp.date);
          let status = 'upcoming';
          if (fDate < today) status = 'overdue';
          else if (fDate.getTime() === today.getTime()) status = 'today';
          return { entry: e, status, studentName: this.getStudentName(e.studentId) };
        })
        .filter(item => item.status === filter)
        .sort((a, b) => new Date(a.entry.followUp.date) - new Date(b.entry.followUp.date));
    },

    getFollowUpStatus(entry) {
      if (!entry.followUp) return '';
      if (entry.followUp.completed) return 'completed';
      const today = startOfDay(new Date());
      const fDate = startOfDay(entry.followUp.date);
      if (fDate < today) return 'overdue';
      if (fDate.getTime() === today.getTime()) return 'today';
      return 'upcoming';
    },

    getFollowUpLabel(entry) {
      if (!entry.followUp) return '';
      if (entry.followUp.completed) return 'Completed';
      const status = this.getFollowUpStatus(entry);
      if (status === 'overdue') return 'Overdue';
      if (status === 'today') return 'Due Today';
      return 'Due ' + fmtDate(entry.followUp.date);
    },

    completeFollowUp(entry) {
      entry.followUp.completed = true;
      entry.followUp.completedDate = new Date().toISOString();
      this.markChanged();
      this.showToast('Follow-up marked as complete');
    },

    getCheckInReminders() {
      const reminders = [];
      this.students.forEach(student => {
        const tier = this.getTier(student.id);
        if (tier < 2) return;
        const studentEntries = this.getStudentEntries(student.id);
        if (studentEntries.length === 0) { reminders.push({ student, daysSince: '7+' }); return; }
        const days = daysBetween(new Date(studentEntries[0].date), new Date());
        if (days >= this.settings.checkInReminderDays) reminders.push({ student, daysSince: days });
      });
      return reminders;
    },

    // ===== Alerts =====
    getAlerts() {
      const alerts = [];
      this.getFollowUps('overdue').forEach(item => {
        alerts.push({ id: 'fu-' + item.entry.id, level: 'overdue', icon: '\u{1F6A9}', title: 'Overdue follow-up for ' + item.studentName, subtitle: item.entry.followUp.note || item.entry.category });
      });
      this.students.forEach(s => {
        const neg = this.getRecentEntries(s.id).filter(e => e.type === 'negative').length;
        if (neg > 0 && this.getRatio(s.id) < this.settings.ratioTarget) {
          alerts.push({ id: 'ratio-' + s.id, level: 'warning', icon: '\u{26A0}\u{FE0F}', title: s.name + ' \u2014 positive ratio below target', subtitle: 'Current: ' + this.getRatio(s.id).toFixed(1) + ':1' });
        }
      });
      this.getCheckInReminders().forEach(r => {
        alerts.push({ id: 'checkin-' + r.student.id, level: 'info', icon: '\u{1F4AC}', title: 'Check in with ' + r.student.name, subtitle: 'Tier ' + this.getTier(r.student.id) + ' \u2014 no entries for ' + r.daysSince + ' days' });
      });
      return alerts;
    },

    // ===== Quick Log =====
    freshLogEntry() {
      return { id: '', studentId: '', date: '', type: '', severity: null, category: '', location: (this.settings ? this.settings.locations[0] : 'Classroom'), expectation: '', description: '', action: '' };
    },

    openQuickLog(preselectedStudentId) {
      this.logEntry = this.freshLogEntry();
      this.logStudentSearch = '';
      this.logHasFollowUp = false;
      this.logFollowUpPreset = '';
      this.logFollowUpDate = '';
      this.logFollowUpNote = '';
      this.logDateOverride = '';
      this.batchMode = false;
      this.batchStudentIds = [];
      if (preselectedStudentId) { this.logEntry.studentId = preselectedStudentId; this.logStep = 2; }
      else { this.logStep = 1; }
      this.showQuickLog = true;
    },

    toggleBatchStudent(id) {
      const idx = this.batchStudentIds.indexOf(id);
      if (idx >= 0) this.batchStudentIds.splice(idx, 1);
      else this.batchStudentIds.push(id);
    },

    logFilteredStudents() {
      const q = this.logStudentSearch.toLowerCase();
      if (!q) return this.students;
      return this.students.filter(s => s.name.toLowerCase().includes(q));
    },

    getLogCategories() {
      if (this.logEntry.type === 'positive') return this.settings.categories.positive;
      if (this.logEntry.severity === 'major') return this.settings.categories.major;
      return this.settings.categories.minor;
    },

    setFollowUpPreset(preset) {
      this.logFollowUpPreset = preset;
      const today = new Date();
      if (preset === 'tomorrow') this.logFollowUpDate = fmtISODate(addDays(today, 1));
      else if (preset === '2days') this.logFollowUpDate = fmtISODate(addDays(today, 2));
      else if (preset === 'nextweek') this.logFollowUpDate = fmtISODate(addDays(today, 7));
      else if (preset === '2weeks') this.logFollowUpDate = fmtISODate(addDays(today, 14));
    },

    quickSaveEntry() {
      // Quick save for positives — skip Step 3
      const date = new Date().toISOString();
      const followUp = null;
      if (this.batchMode && this.batchStudentIds.length > 0) {
        this.batchStudentIds.forEach(sid => {
          this.entries.push(JSON.parse(JSON.stringify({ ...this.logEntry, id: genId('ent'), studentId: sid, date, followUp })));
        });
        this.showToast(this.batchStudentIds.length + ' positive entries logged!');
        this.lastAddedEntryId = null;
        this.lastLoggedStudentId = null;
      } else {
        if (!this.logEntry.studentId || !this.logEntry.type || !this.logEntry.category) return;
        const entry = JSON.parse(JSON.stringify({ ...this.logEntry, id: genId('ent'), date, followUp }));
        this.entries.push(entry);
        this.lastAddedEntryId = entry.id;
        this.lastLoggedStudentId = this.logEntry.studentId;
        this.showToast('Positive entry logged!', true);
      }
      this.markChanged();
      this.showQuickLog = false;
    },

    submitEntry() {
      const studentIds = this.batchMode ? this.batchStudentIds : [this.logEntry.studentId];
      if (studentIds.length === 0 || !this.logEntry.type || !this.logEntry.category) {
        this.showToast('Please complete all required fields.');
        return;
      }

      const date = this.logDateOverride ? new Date(this.logDateOverride).toISOString() : new Date().toISOString();
      const followUp = (this.logHasFollowUp && this.logFollowUpDate)
        ? { date: this.logFollowUpDate, note: this.logFollowUpNote, completed: false, completedDate: null, completedNote: '' }
        : null;

      studentIds.forEach(sid => {
        this.entries.push(JSON.parse(JSON.stringify({ ...this.logEntry, id: genId('ent'), studentId: sid, date, followUp })));
      });

      if (studentIds.length > 1) {
        this.lastAddedEntryId = null;
        this.lastLoggedStudentId = null;
        this.showToast(studentIds.length + ' entries logged!');
      } else {
        this.lastAddedEntryId = this.entries[this.entries.length - 1].id;
        this.lastLoggedStudentId = studentIds[0];
        this.showToast(this.logEntry.type === 'positive' ? 'Positive entry logged!' : 'Behaviour entry logged.', true);
      }
      this.markChanged();
      this.showQuickLog = false;
    },

    undoLastEntry() {
      if (this.lastAddedEntryId) {
        this.entries = this.entries.filter(e => e.id !== this.lastAddedEntryId);
        this.lastAddedEntryId = null;
        this.markChanged();
        this.hideToast();
        this.showToast('Entry removed.');
      }
    },

    // ===== Edit/Delete Entry =====
    openEditEntry(entry) {
      this.editingEntry = JSON.parse(JSON.stringify(entry));
      this.showEditEntry = true;
    },

    saveEditEntry() {
      const idx = this.entries.findIndex(e => e.id === this.editingEntry.id);
      if (idx >= 0) this.entries[idx] = JSON.parse(JSON.stringify(this.editingEntry));
      this.showEditEntry = false;
      this.markChanged();
      this.showToast('Entry updated.');
    },

    deleteEntry(id) {
      if (!confirm('Delete this entry? This cannot be undone.')) return;
      this.entries = this.entries.filter(e => e.id !== id);
      this.showEditEntry = false;
      this.markChanged();
      this.showToast('Entry deleted.');
    },

    // ===== Student Notes =====
    getStudentNotes(studentId) {
      return this.studentNotes.filter(n => n.studentId === studentId).sort((a, b) => new Date(b.date) - new Date(a.date));
    },

    addStudentNote() {
      if (!this.newNoteText.trim()) return;
      this.studentNotes.push({
        id: genId('note'),
        studentId: this.selectedStudentId,
        date: new Date().toISOString(),
        text: this.newNoteText.trim()
      });
      this.newNoteText = '';
      this.showAddNote = false;
      this.markChanged();
      this.showToast('Note saved.');
    },

    // ===== Today Stats =====
    getTodayStats() {
      const today = startOfDay(new Date()).getTime();
      const todayEntries = this.entries.filter(e => startOfDay(e.date).getTime() === today);
      const names = [...new Set(todayEntries.map(e => this.getStudentName(e.studentId)))];
      return {
        total: todayEntries.length,
        positive: todayEntries.filter(e => e.type === 'positive').length,
        negative: todayEntries.filter(e => e.type === 'negative').length,
        studentNames: names.join(', ') || 'None'
      };
    },

    // ===== Filtered Entries (for analytics) =====
    getFilteredEntries() {
      if (this.analyticsRange === 'all') return this.entries;
      const days = { week: 7, '2weeks': 14, '4weeks': 28 };
      const d = days[this.analyticsRange] || 28;
      const cutoff = new Date();
      cutoff.setDate(cutoff.getDate() - d);
      return this.entries.filter(e => new Date(e.date) >= cutoff);
    },

    // ===== Report =====
    generateReport() {
      const entries = this.getFilteredEntries();
      const pos = entries.filter(e => e.type === 'positive').length;
      const neg = entries.filter(e => e.type === 'negative').length;
      const ratio = neg > 0 ? (pos / neg).toFixed(1) : (pos > 0 ? pos + '.0' : '0.0');
      const t1 = this.students.filter(s => this.getTier(s.id) === 1).length;
      const t2 = this.students.filter(s => this.getTier(s.id) === 2).length;
      const t3 = this.students.filter(s => this.getTier(s.id) === 3).length;

      const overdue = this.getFollowUps('overdue').length;
      const ratioWarnings = this.students.filter(s => {
        const n = this.getRecentEntries(s.id).filter(e => e.type === 'negative').length;
        return n > 0 && this.getRatio(s.id) < this.settings.ratioTarget;
      });

      const concern = this.students.filter(s => this.getTier(s.id) >= 2).map(s =>
        '<li><strong>' + escHtml(s.name) + '</strong> — Tier ' + this.getTier(s.id) + ', ratio ' + this.getRatio(s.id).toFixed(1) + ':1, ' + this.getStudentNegativeCount(s.id) + ' negative entries</li>'
      ).join('');

      const topNeg = this.getTopCategories('negative').slice(0, 3).map(c => c.category + ' (' + c.count + ')').join(', ');
      const rangeName = { week: 'This Week', '2weeks': 'Last 2 Weeks', '4weeks': 'Last 4 Weeks', all: 'All Time' }[this.analyticsRange] || 'Last 4 Weeks';

      this.reportHtml = '<div style="margin-bottom:20px;"><h3 style="margin:0 0 4px;">Behaviour Book — Weekly Summary</h3><div style="color:#8C8279;font-size:0.8rem;">' + rangeName + ' &bull; ' + fmtDate(new Date()) + ' &bull; ' + this.students.length + ' students</div></div>' +
        '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;text-align:center;">' +
        '<div style="background:#EDF5EF;padding:10px;border-radius:8px;"><div style="font-size:1.3rem;font-weight:800;color:#7A9E7E;">' + pos + '</div><div style="font-size:0.65rem;color:#8C8279;">POSITIVE</div></div>' +
        '<div style="background:#F9EDE6;padding:10px;border-radius:8px;"><div style="font-size:1.3rem;font-weight:800;color:#C17248;">' + neg + '</div><div style="font-size:0.65rem;color:#8C8279;">NEGATIVE</div></div>' +
        '<div style="background:#F5EDE3;padding:10px;border-radius:8px;"><div style="font-size:1.3rem;font-weight:800;">' + ratio + ':1</div><div style="font-size:0.65rem;color:#8C8279;">RATIO</div></div>' +
        '<div style="background:#F5EDE3;padding:10px;border-radius:8px;"><div style="font-size:1.3rem;font-weight:800;">' + entries.length + '</div><div style="font-size:0.65rem;color:#8C8279;">TOTAL</div></div>' +
        '</div>' +
        '<div style="margin-bottom:12px;"><strong>Tier Distribution:</strong> Tier 1: ' + t1 + ' &bull; Tier 2: ' + t2 + ' &bull; Tier 3: ' + t3 + '</div>' +
        (topNeg ? '<div style="margin-bottom:12px;"><strong>Top Negative Categories:</strong> ' + topNeg + '</div>' : '') +
        (overdue > 0 ? '<div style="margin-bottom:12px;color:#B94A3E;"><strong>Overdue Follow-ups:</strong> ' + overdue + '</div>' : '<div style="margin-bottom:12px;color:#7A9E7E;"><strong>Follow-ups:</strong> All up to date</div>') +
        (ratioWarnings.length > 0 ? '<div style="margin-bottom:12px;"><strong>Below Ratio Target (' + this.settings.ratioTarget + ':1):</strong> ' + ratioWarnings.map(s => escHtml(s.name) + ' (' + this.getRatio(s.id).toFixed(1) + ':1)').join(', ') + '</div>' : '') +
        (concern ? '<div style="margin-bottom:8px;"><strong>Students of Concern:</strong></div><ul style="margin:0 0 12px 18px;">' + concern + '</ul>' : '<div style="margin-bottom:12px;color:#7A9E7E;"><strong>All students at Tier 1.</strong></div>');

      this.showReport = true;
    },

    copyReport() {
      const el = document.createElement('div');
      el.innerHTML = this.reportHtml;
      const text = el.innerText;
      navigator.clipboard.writeText(text).then(() => this.showToast('Report copied to clipboard!'));
    },

    printReport() {
      const w = window.open('', '_blank');
      w.document.write('<html><head><title>Behaviour Book Report</title><style>body{font-family:system-ui,sans-serif;padding:24px;font-size:14px;line-height:1.5;max-width:700px;}</style></head><body>' + this.reportHtml + '</body></html>');
      w.document.close();
      w.print();
    },

    // ===== Time of Day Analytics =====
    getEntriesByTimeOfDay() {
      const periods = [
        { period: 'Morning (8-10am)', min: 8, max: 10 },
        { period: 'Mid-morning (10-12pm)', min: 10, max: 12 },
        { period: 'Lunch (12-1:30pm)', min: 12, max: 13.5 },
        { period: 'Afternoon (1:30-4pm)', min: 13.5, max: 16 },
      ];
      const negatives = this.getFilteredEntries().filter(e => e.type === 'negative');
      const counts = periods.map(p => {
        const count = negatives.filter(e => {
          const h = new Date(e.date).getHours() + new Date(e.date).getMinutes() / 60;
          return h >= p.min && h < p.max;
        }).length;
        return { ...p, count };
      });
      const max = Math.max(...counts.map(c => c.count), 1);
      return counts.map(c => ({ ...c, percent: Math.round((c.count / max) * 100) }));
    },

    // ===== Suggested Actions =====
    getSuggestedActions() {
      const cat = this.logEntry.category;
      const sev = this.logEntry.severity;
      const base = ['Verbal reminder', 'Private chat', 'Moved seats'];
      const catActions = {
        'Disruption': ['Proximity', 'Visual cue card', 'Break offered', 'Sensory tool provided'],
        'Off Task': ['Redirected', 'Timer set', 'Task broken down', 'Checklist provided'],
        'Late': ['Discussed time management', 'Visual schedule provided'],
        'Unprepared': ['Lunchtime catch-up', 'Loaned materials', 'Organisational support'],
        'Inappropriate Language': ['Discussed impact', 'Practised alternative language'],
        'Non-Compliance': ['Choice given', 'Waiting time', 'Calm instruction repeated'],
        'Out of Bounds': ['Escorted back', 'Boundary reminder'],
        'Technology Misuse': ['Device removed', 'Digital citizenship discussion'],
        'Physical Aggression': ['Removed from situation', 'Office referral', 'First aid checked', 'Parents contacted'],
        'Bullying': ['Office referral', 'Documented details', 'Parents contacted', 'Support for target'],
        'Property Damage': ['Office referral', 'Restorative action planned', 'Parents contacted'],
        'Abusive Language': ['Office referral', 'Parents contacted', 'Removed from class'],
        'Leaving School Grounds': ['Office referral', 'Parents contacted immediately', 'Safety plan reviewed'],
        'Defiance (Sustained)': ['Deputy called', 'Calm space offered', 'Parents contacted'],
        'Theft': ['Office referral', 'Restorative conversation', 'Item returned'],
        'Harassment': ['Office referral', 'Documented details', 'Parents contacted'],
      };
      const specific = catActions[cat] || [];
      if (sev === 'major') return [...specific, 'Office referral', 'Parents contacted', 'Restorative conversation scheduled'].filter((v, i, a) => a.indexOf(v) === i);
      return [...specific, ...base].filter((v, i, a) => a.indexOf(v) === i).slice(0, 8);
    },

    getSuggestedPositiveActions() {
      return ['Verbal praise', 'Specific praise to class', 'Positive note home', 'Sticker/stamp', 'Class acknowledgement', 'Shared with leadership', 'Phone call home (positive)'];
    },

    // ===== Strategy Guide =====
    getStrategyDetail(key) {
      const strategies = {
        'positive-reinforcement': '<h4>What is it?</h4><p>Deliberately and consistently noticing and naming positive behaviour. The goal is to reinforce what you <em>want</em> to see, not just correct what you don\'t.</p><h4>How to do it</h4><ul><li>Be specific: "Thanks for putting your book away without being asked" beats "Good job"</li><li>Be immediate: acknowledge within seconds, not minutes</li><li>Be genuine: students can tell when praise is performative</li><li>Name the expectation: "That\'s what Being Responsible looks like"</li></ul><h4>When to use it</h4><p>Always. This is the foundation. Aim for at least 4 positive acknowledgements for every 1 correction. If a student\'s ratio is low, this is the first thing to fix.</p>',

        'explicit-teaching': '<h4>What is it?</h4><p>Teaching behavioural expectations the same way you\'d teach reading or maths — with explicit instruction, modelling, and practice. Don\'t assume students know what "Be Respectful" looks like in the library vs. the playground.</p><h4>How to do it</h4><ul><li>Name the expectation and the setting: "Let\'s talk about what Being Safe looks like on the playground"</li><li>Model it: show them what it looks and sounds like</li><li>Practice: role-play scenarios together</li><li>Reinforce: catch students doing it and name it immediately</li></ul><h4>When to use it</h4><p>At the start of term, after holidays, when introducing new routines, or when pattern analysis shows a specific expectation is being breached repeatedly.</p>',

        'cico': '<h4>What is it?</h4><p>Check-In Check-Out (CICO) is a Tier 2 strategy where a student briefly meets with a mentor at the start and end of each day. The mentor reviews goals, provides encouragement, and tracks progress on a simple points card.</p><h4>How to do it</h4><ul><li>Identify a trusted adult (not necessarily the classroom teacher)</li><li>Morning check-in: review 2-3 simple goals for the day (e.g. "Follow instructions first time", "Keep hands to self")</li><li>Teachers rate the student against goals at each session break</li><li>Afternoon check-out: review the day, celebrate wins, set tomorrow\'s focus</li><li>Send the card home for parent signature (builds home-school connection)</li></ul><h4>When to use it</h4><p>For Tier 2 students who need more adult connection, structure, and feedback than universal supports provide. Typically runs for 6-8 weeks with data review.</p><p style=\"margin-top:10px;\"><a href=\"https://education.nsw.gov.au/schooling/school-community/attendance-behaviour-and-engagement/positive-behaviour-for-learning/pbl-resources/pbl-tier-2-targeted-systems-of-support\" target=\"_blank\" class=\"source-link\">NSW PBL Tier 2 guide &#8599;</a></p>',

        'social-skills': '<h4>What is it?</h4><p>Small group sessions (4-6 students) that explicitly teach social skills like turn-taking, conflict resolution, reading social cues, or managing frustration. Usually run by a wellbeing officer or experienced teacher.</p><h4>How to do it</h4><ul><li>Groups meet 2-3 times per week for 20-30 minutes</li><li>Use structured programs (e.g. You Can Do It!, Bounce Back, Stop Think Do)</li><li>Include role-play, discussion, and real-world practice</li><li>Coordinate with classroom teacher so skills are reinforced in class</li></ul><h4>When to use it</h4><p>When pattern analysis shows recurring interpersonal issues — disruption, inappropriate language, difficulty with peers. Works best alongside CICO.</p>',

        'restorative-conversation': '<h4>What is it?</h4><p>A structured conversation that helps a student reflect on their behaviour, understand its impact, and take responsibility for making things right. It\'s not about punishment — it\'s about learning and repairing relationships.</p><h4>The questions</h4><ul><li>What happened?</li><li>What were you thinking at the time?</li><li>What have you thought about since?</li><li>Who has been affected by what you did?</li><li>In what way have they been affected?</li><li>What do you think you need to do to make things right?</li></ul><h4>Tips</h4><ul><li>Wait until everyone is calm — don\'t do this in the heat of the moment</li><li>Listen more than you talk</li><li>Let the student generate the "make it right" plan wherever possible</li><li>Follow up to check the plan was carried out</li></ul><p style="margin-top:10px;"><a href="https://education.nsw.gov.au/schooling/school-community/attendance-behaviour-and-engagement/behaviour-support-toolkit/support-for-teachers/restorative-practices/restorative-practices" target="_blank" class="source-link">NSW restorative practices guide &#8599;</a></p>',

        'parent-contact': '<h4>Why it matters</h4><p>Parents are partners, not an audience for bad news. Early, honest communication builds trust and creates consistency between home and school. Many parents of Tier 2/3 students only hear from school when something goes wrong — changing that changes the relationship.</p><h4>How to do it well</h4><ul><li>Lead with something positive whenever possible</li><li>Be factual: describe what happened, avoid judgements about character</li><li>Share what you\'ve already tried and what\'s working</li><li>Ask for their perspective — they know their child best</li><li>Agree on 1-2 specific things to try at home and school</li><li>Schedule a follow-up: "I\'ll call again on Friday to let you know how the week goes"</li></ul><h4>When to use it</h4><p>At Tier 2 (proactive, collaborative conversation) and always after a major incident. Don\'t wait until things are critical.</p>',

        'fba': '<h4>What is it?</h4><p>A Functional Behaviour Assessment (FBA) is a systematic process for understanding <em>why</em> a behaviour is happening. All behaviour serves a function — usually to get something (attention, a preferred activity, sensory input) or to avoid something (a difficult task, social interaction, sensory overwhelm).</p><h4>How it works</h4><ul><li>Collect data: when does the behaviour happen? What comes before it (antecedent)? What comes after (consequence)?</li><li>Look for patterns: is it always at the same time, place, subject, or with the same people?</li><li>Hypothesise the function: "Ethan hits when he\'s losing a game → function is likely escape from frustration/embarrassment"</li><li>Design a plan that addresses the function, not just the behaviour</li></ul><h4>Who does it?</h4><p>Usually led by the Student Wellbeing Team, school psychologist, or behaviour specialist, with input from the classroom teacher and family. The classroom teacher\'s behaviour log data is critical input.</p><p style=\"margin-top:10px;\"><a href=\"https://education.nsw.gov.au/schooling/school-community/attendance-behaviour-and-engagement/behaviour-support-toolkit/support-for-teachers/functional-behaviour-assessment--fba-\" target=\"_blank\" class=\"source-link\">NSW FBA guide &#8599;</a> <span style=\"margin:0 4px;color:var(--sand-darker)\">|</span> <a href=\"https://behaviour.education.qld.gov.au/supporting-student-behaviour/intensive-support/functional-behaviour-assessment\" target=\"_blank\" class=\"source-link\">QLD FBA guide &#8599;</a></p>',

        'bsp': '<h4>What is it?</h4><p>A Behaviour Support Plan (BSP) is a written plan that documents the strategies a school will use to support a student with significant behavioural needs. It\'s informed by the FBA and involves the student, family, teacher, and wellbeing team.</p><h4>What it includes</h4><ul><li>The student\'s strengths and interests</li><li>Specific target behaviours and their hypothesised functions</li><li>Prevention strategies (changes to environment, routine, or instruction)</li><li>Teaching strategies (replacement behaviours, coping skills)</li><li>Response strategies (what to do when the behaviour occurs, and when it doesn\'t)</li><li>Review date and success criteria</li></ul><h4>Tips</h4><ul><li>Keep it to one page if possible — it needs to be usable, not a filing cabinet document</li><li>Make sure everyone who works with the student has read it</li><li>Review every 4-6 weeks with data</li></ul><p style=\"margin-top:10px;\"><a href=\"https://www2.education.vic.gov.au/pal/behaviour-students/guidance/functional-behaviour-assessment\" target=\"_blank\" class=\"source-link\">VIC behaviour support guidance &#8599;</a></p>',

        'wellbeing-team': '<h4>Who are they?</h4><p>The Student Wellbeing Team typically includes the assistant principal, school psychologist or counsellor, wellbeing officer, and relevant teachers. They meet regularly to review students of concern and coordinate support.</p><h4>When to involve them</h4><ul><li>When a student reaches Tier 3 (persistent/severe behaviour)</li><li>When classroom strategies have been tried and documented but aren\'t working</li><li>When you suspect underlying factors (trauma, learning difficulties, family issues, mental health)</li><li>When an FBA or BSP is needed</li></ul><h4>What to bring to the meeting</h4><p>Your Behaviour Book data: the timeline, patterns, ratio, what you\'ve tried, and follow-ups completed. This is exactly the kind of evidence that makes these meetings productive instead of vague.</p><p style="margin-top:10px;"><a href="https://www2.education.vic.gov.au/pal/behaviour-students/guidance/school-wide-positive-behaviour-support-swpbs-framework" target="_blank" class="source-link">VIC behaviour guidance &#8599;</a></p>',

        'reteach-expectation': '<h4>What is it?</h4><p>When pattern analysis shows a specific expectation is being breached repeatedly (e.g. "Be Respectful" linked to Disruption 4 times), the strategy is to re-teach that expectation explicitly — not as punishment, but as instruction.</p><h4>How to do it</h4><ul><li>Whole-class or small-group mini-lesson (10-15 minutes)</li><li>"This week we\'re focusing on what \'Be Respectful\' looks like during group work"</li><li>Use T-chart: what does it look like? What does it sound like?</li><li>Role-play the right way and the wrong way</li><li>Actively look for and acknowledge students demonstrating it over the following days</li></ul><h4>Why re-teach rather than just correct?</h4><p>Correction tells a student what <em>not</em> to do. Re-teaching tells them what <em>to</em> do instead. A student who keeps disrupting during group work may genuinely not know what respectful participation looks like.</p>',

        'increase-positives': '<h4>What is it?</h4><p>A deliberate effort to increase the ratio of positive-to-negative interactions with a specific student. Research recommends at least 4:1 — four positive acknowledgements for every one correction.</p><h4>Practical strategies</h4><ul><li>Set a goal: "I will catch this student doing something right at least 3 times today"</li><li>Use proximity praise: praise the student next to them for the behaviour you want to see</li><li>Use non-verbal acknowledgements: thumbs up, smile, nod</li><li>Create low-stakes opportunities for success: give them a job, ask them to demonstrate something they\'re good at</li><li>Log every positive interaction — the act of logging makes you more aware</li></ul><h4>Why it works</h4><p>Students who only hear corrections learn to avoid the teacher, not to improve their behaviour. Shifting the ratio rebuilds the relationship and creates motivation to meet expectations.</p>',

        'peer-mentoring': '<h4>What is it?</h4><p>Pairing a student who needs support with a positive peer who can model expected behaviour. This isn\'t about making one student "fix" another — it\'s about creating natural, positive social connections.</p><h4>How to do it</h4><ul><li>Choose the mentor carefully: a kind, patient student who won\'t feel burdened</li><li>Brief the mentor: "You\'re not in charge of them — you\'re just sitting together and being a good example"</li><li>Structure the pairing: shared activities, partner work, buddy reading</li><li>Check in with both students regularly</li></ul><h4>When to use it</h4><p>For Tier 2 students, especially those who are new, socially isolated, or who respond well to peer relationships. Not appropriate when the student\'s behaviour might put the mentor at risk.</p>',
      };
      return strategies[key] || '<p>No detailed guidance available for this strategy.</p>';
    },

    getStrategiesForTab() {
      const all = [
        { key: 'positive-reinforcement', title: 'Positive Reinforcement', tier: 'universal', tierLabel: 'All Tiers' },
        { key: 'explicit-teaching', title: 'Explicit Teaching of Expectations', tier: 'universal', tierLabel: 'All Tiers' },
        { key: 'reteach-expectation', title: 'Re-teach a Specific Expectation', tier: 'universal', tierLabel: 'Tier 1-2' },
        { key: 'increase-positives', title: 'Increase Positive Acknowledgement', tier: 'universal', tierLabel: 'All Tiers' },
        { key: 'cico', title: 'Check-In Check-Out (CICO)', tier: 'targeted', tierLabel: 'Tier 2' },
        { key: 'social-skills', title: 'Social Skills Group', tier: 'targeted', tierLabel: 'Tier 2' },
        { key: 'peer-mentoring', title: 'Peer Mentoring', tier: 'targeted', tierLabel: 'Tier 2' },
        { key: 'restorative-conversation', title: 'Restorative Conversation', tier: 'targeted', tierLabel: 'Tier 2-3' },
        { key: 'parent-contact', title: 'Parent/Carer Contact', tier: 'targeted', tierLabel: 'Tier 2-3' },
        { key: 'fba', title: 'Functional Behaviour Assessment (FBA)', tier: 'intensive', tierLabel: 'Tier 3' },
        { key: 'bsp', title: 'Behaviour Support Plan (BSP)', tier: 'intensive', tierLabel: 'Tier 3' },
        { key: 'wellbeing-team', title: 'Student Wellbeing Team Involvement', tier: 'intensive', tierLabel: 'Tier 3' },
      ];
      if (this.strategyBrowserTab === 'all') return all;
      return all.filter(s => s.tier === this.strategyBrowserTab);
    },

    // ===== Analytics =====
    getOverallRatio() {
      const fe = this.getFilteredEntries();
      const pos = fe.filter(e => e.type === 'positive').length;
      const neg = fe.filter(e => e.type === 'negative').length;
      if (neg === 0) return pos > 0 ? pos : 0;
      return pos / neg;
    },

    getTopCategories(type) {
      const filtered = this.getFilteredEntries().filter(e => e.type === type);
      const counts = {};
      filtered.forEach(e => { counts[e.category] = (counts[e.category] || 0) + 1; });
      const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 6);
      const max = sorted.length > 0 ? sorted[0][1] : 1;
      return sorted.map(([category, count]) => ({ category, count, percent: Math.round((count / max) * 100) }));
    },

    getTopLocations() {
      const negatives = this.getFilteredEntries().filter(e => e.type === 'negative' && e.location);
      const counts = {};
      negatives.forEach(e => { counts[e.location] = (counts[e.location] || 0) + 1; });
      const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 6);
      const max = sorted.length > 0 ? sorted[0][1] : 1;
      return sorted.map(([location, count]) => ({ location, count, percent: Math.round((count / max) * 100) }));
    },

    getEntriesByDay() {
      const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
      const counts = [0, 0, 0, 0, 0, 0, 0];
      this.getFilteredEntries().forEach(e => { counts[new Date(e.date).getDay()]++; });
      const max = Math.max(...counts, 1);
      return days.map((day, i) => ({ day: day.slice(0, 3), count: counts[i], percent: Math.round((counts[i] / max) * 100) }));
    },

    getStudentsNeedingSupport() {
      return this.students
        .filter(s => this.getTier(s.id) >= 2)
        .map(s => {
          const tier = this.getTier(s.id);
          const ratio = this.getRatio(s.id);
          const neg = this.getStudentNegativeCount(s.id);
          let reason = 'Tier ' + tier;
          if (ratio < this.settings.ratioTarget && neg > 0) reason += ' \u2022 Ratio: ' + ratio.toFixed(1) + ':1';
          reason += ' \u2022 ' + neg + ' negative entries (4 wks)';
          return { student: s, tier, reason };
        })
        .sort((a, b) => b.tier - a.tier || this.getRatio(a.student.id) - this.getRatio(b.student.id));
    },

    // ===== Toast =====
    showToast(message, canUndo) {
      this.toastMessage = message;
      this.toastUndo = canUndo || false;
      clearTimeout(this.toastTimer);
      this.toastTimer = setTimeout(() => { this.hideToast(); }, canUndo ? 5000 : 3000);
    },
    hideToast() { this.toastMessage = ''; this.toastUndo = false; },

    // ===== Formatting =====
    formatDate(d) { return fmtDate(d); },
    formatDateTime(d) { return fmtDateTime(d); }
  };
}
</script>
